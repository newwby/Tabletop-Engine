name: Bug / Unexpected Behaviour
description: Report behaviour that differs from expectations.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Non-technical descriptions are completely fine.

  - type: dropdown
    id: area
    attributes:
      label: What area is affected?
      options:
        - System workflow
        - Campaign generation/output
        - Agent behaviour (indicate which in summary)
        - Documentation/process
        - Other (please indicate in summary)
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Short summary
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What is supposed to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What went wrong? Optionally include any additional context, screenshots, or links.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (optional)
      description: If known, list simple steps, otherwise leave blank.
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Unassigned (refer to dev)
        - Low (minor annoyance)
        - Medium (blocks part of workflow)
        - High (major blocker)
    validations:
      required: true

