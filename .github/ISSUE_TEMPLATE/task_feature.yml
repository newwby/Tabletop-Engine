name: Task / Feature
description: Suggest a workflow, system, or campaign improvement.
title: "[Task/Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Keep this lightweight—plain language is welcome.

  - type: dropdown
    id: area
    attributes:
      label: What area does this relate to?
      options:
        - System/workflow
        - Campaign
        - Agent (please indicate in summary)
        - Documentation
        - Other (please indicate in summary)
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: What would you like to improve?
      placeholder: Summarise change in brief here; If not, leave blank. If you have additional context or links, provide them here.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or missed outcome.
      placeholder: What is not working as you'd like?
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: What would success look like?
      description: Keep this simple and practical.
      placeholder: What should be true after this is done?
